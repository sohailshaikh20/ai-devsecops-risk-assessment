name: DevSecOps AI Security Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main

jobs:

  security-scans:
    if: "!contains(github.event.head_commit.message, '[auto]')"
    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install semgrep checkov scikit-learn pandas matplotlib

      - name: Create findings folder
        run: mkdir -p findings

      - name: Run Semgrep
        run: |
          semgrep --config=auto app/starbucks --json > findings/semgrep.json

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'app/starbucks'
          format: 'json'
          output: 'findings/trivy.json'

      - name: Run Checkov App Scan
        run: |
          checkov -d app/starbucks --output json > findings/checkov.json || true

      - name: Run Terraform Scan
        run: |
          checkov -d terraform --output json > findings/terraform_checkov.json || true

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: scan-results
          path: findings/


  normalization:
    needs: security-scans
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas

      - uses: actions/download-artifact@v4
        with:
          name: scan-results
          path: findings/

      - name: Run normalization
        run: python risk_engine/normalize.py

      - name: Upload normalized data
        uses: actions/upload-artifact@v4
        with:
          name: normalized-data
          path: findings/


  correlation:
    needs: normalization
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas

      - uses: actions/download-artifact@v4
        with:
          name: normalized-data
          path: findings/

      - name: Run correlation engine
        run: python risk_engine/correlate.py

      - name: Upload correlated data
        uses: actions/upload-artifact@v4
        with:
          name: correlated-data
          path: findings/


  scoring:
    needs: correlation
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas

      - uses: actions/download-artifact@v4
        with:
          name: correlated-data
          path: findings/

      - name: Run risk scoring
        run: python risk_engine/score.py

      - name: Upload scored results
        uses: actions/upload-artifact@v4
        with:
          name: scored-results
          path: findings/


  ml-analysis:
    needs: scoring
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas scikit-learn

      - uses: actions/download-artifact@v4
        with:
          name: scored-results
          path: findings/

      - name: Run ML model
        run: python risk_engine/ml_model.py

      - name: Upload ML results
        uses: actions/upload-artifact@v4
        with:
          name: ml-results
          path: findings/


  visualization:
    needs: ml-analysis
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install pandas matplotlib

      - uses: actions/download-artifact@v4
        with:
          name: ml-results
          path: findings/

      - name: Generate visualizations
        run: |
          python risk_engine/visualize.py
          python risk_engine/trend_analysis.py

      - name: Upload final reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: findings/


  security-gate:
    needs: visualization
    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - uses: actions/download-artifact@v4
        with:
          name: security-reports
          path: findings/

      - name: Apply security gate
        run: python risk_engine/gate.py

      - name: Commit reports to repository
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add -f findings/*.json || true
          git add -f findings/*.md || true
          git add -f findings/*.png || true

          git commit -m "Update security analysis results [auto]" || true
          git push
